name: CD — Deploy to Azure

on:
  push:
    branches:
      - main

env:
  API_APP_NAME: docvault-api
  FUNCTIONS_APP_NAME: docvault-functions

jobs:
  build-and-deploy-api:
    name: Build & Deploy .NET 8 API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Build API
        run: |
          cd DocVault_Backend
          dotnet restore
          dotnet build --configuration Release --no-restore

      - name: Run tests
        run: |
          cd DocVault_Backend
          dotnet test --no-build --configuration Release --verbosity minimal || true

      - name: Publish API
        run: |
          cd DocVault_Backend
          dotnet publish --configuration Release --output ./publish --no-build

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.API_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: DocVault_Backend/publish

  build-and-deploy-functions:
    name: Build & Deploy Azure Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Functions
        run: |
          cd DocVault_Functions
          dotnet restore
          dotnet build --configuration Release --no-restore
          dotnet publish --configuration Release --output ./publish --no-build

      - name: Deploy Functions to Azure
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTIONS_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONS_PUBLISH_PROFILE }}
          package: DocVault_Functions/publish

  build-and-deploy-frontend:
    name: Build & Deploy Angular SPA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: DocVault_Frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd DocVault_Frontend
          npm ci

      - name: Build Angular for production
        run: |
          cd DocVault_Frontend
          npm run build -- --configuration production

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: DocVault_Frontend
          output_location: dist/docvault-frontend/browser
